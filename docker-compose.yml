# ============================================================
# quanteo docker-compose — 로컬 개발 / VPS 배포용 (Toss증권 어댑터)
#
# 사전 준비: ~/quanteo/config/quanteo.yaml 에 client_id/client_secret 설정
# info 서브시스템(뉴스·환율·캘린더 알람)을 쓰려면 quanteo.yaml에
# info.enabled: true 및 anthropic/finnhub api_key도 함께 설정해야 한다 —
# --with-info 플래그만으로는 부족하다. 기동 여부는 GET /status의
# info_enabled 필드로 확인할 것.
# screener 서브시스템(일일 종목 추천, Stock Miner, Phase 16)을 쓰려면
# quanteo.yaml에 screener.enabled: true 및 dart/anthropic api_key,
# telegram 설정을 해야 한다 — quanteo-screener 컨테이너는 이 없이는
# 시작 즉시 경고 로그를 남기고 정상 종료한다(재시도 루프 없음, 아래
# restart 정책 참고).
# 추가로 screener.krx.id/pw(data.krx.co.kr 개인 회원 계정)도 필요하다 —
# KRX가 2026-07부터 전종목시세 등 대량 조회 엔드포인트에 로그인을 요구해서,
# 이게 없으면 screener.enabled: true여도 유니버스 조회 단계에서 실패한다.
#
# 사용법:
#   docker compose up -d                     # 기본 실행 (core + screener)
#   docker compose up -d --build             # 이미지 재빌드
#   docker compose logs -f quanteo-core      # 트레이딩 코어 로그 실시간 확인
#   docker compose logs -f quanteo-screener  # Stock Miner 로그 실시간 확인
# ============================================================

services:
  quanteo-core:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: quanteo:latest
    container_name: quanteo-core
    restart: unless-stopped

    ports:
      - "8000:8000"

    volumes:
      # quanteo.yaml(자격증명) + sqlite DB — 호스트 ~/quanteo 전체를 그대로 마운트.
      # Path.home()/quanteo 기준 기본 경로(설정: config/quanteo.yaml, DB: data/quanteo.db)와
      # 1:1로 맞아떨어지므로 QUANTEO_CONFIG_PATH 재지정이 불필요함. DB 쓰기 때문에 read-write.
      # 컨테이너 quanteo 유저는 UID/GID 1000으로 고정되어 있다 — 호스트 ~/quanteo
      # 소유자의 UID가 다르면 DB 쓰기가 권한 오류로 실패할 수 있으니
      # `chown -R 1000:1000 ~/quanteo`로 맞춰줄 것.
      - "${QUANTEO_HOME:-${HOME}/quanteo}:/home/quanteo/quanteo"
      # Google Calendar OAuth 캐시 (선택 — 캘린더 기능 안 쓰면 없어도 정상 동작)
      - "${HOME}/.quanteo:/home/quanteo/.quanteo"

    environment:
      - PYTHONUNBUFFERED=1

    # 기본 명령: 국내 시장 + 정보수집·알람 서브시스템, 트레이딩은 미포함
    # --with-info 초기화 실패(설정 누락 등) 시에도 컨테이너는 계속 기동하고
    # ERROR 로그만 남긴다 — 실제 기동 여부는 GET /status의 info_enabled로 확인.
    # 트레이딩 활성화: --with-trading --i-understand-real-money 추가
    command:
      [
        "--market",
        "domestic",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--with-info",
      ]

    healthcheck:
      test:
        [
          "CMD",
          "/app/.venv/bin/python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/status')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  quanteo-screener:
    # Stock Miner(Phase 16) — core.app과 완전히 분리된 독립 프로세스.
    # build:는 일부러 두지 않는다 — quanteo-core가 빌드하는 quanteo:latest를
    # 그대로 재사용(entrypoint만 덮어씀). 두 서비스가 각자 build:를 가지면
    # 동일 태그를 동시에 export하려다 "image already exists" 충돌이 난다.
    # 이미지 재빌드는 quanteo-core 쪽에서: docker compose build quanteo-core
    depends_on:
      - quanteo-core
    image: quanteo:latest
    container_name: quanteo-screener
    entrypoint: ["python", "-m", "screener.main"]
    # screener.enabled: false(기본값)면 프로세스가 경고 로그만 남기고 정상
    # 종료(exit 0)한다 — unless-stopped를 쓰면 이 경우 재시작 루프로 로그가
    # 계속 쌓이므로, 실패(비정상 종료)한 경우에만 재시작하는 정책을 쓴다.
    restart: on-failure

    volumes:
      # quanteo-core와 동일한 ~/quanteo 마운트를 공유한다 — screener.enabled
      # 등 자격증명은 같은 quanteo.yaml에서, SQLite 상태(워치리스트)도 같은
      # ~/quanteo/data/quanteo.db를 공유한다(core/store/db.py 기본 경로).
      - "${QUANTEO_HOME:-${HOME}/quanteo}:/home/quanteo/quanteo"

    environment:
      - PYTHONUNBUFFERED=1

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
